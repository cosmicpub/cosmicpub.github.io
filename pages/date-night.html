let history = [];

function generate(){

let available = ideas.filter(item => !history.includes(item));

if(available.length === 0){
history = [];
available = ideas;
}

const idea = available[Math.floor(Math.random()*available.length)];

history.push(idea);

if(history.length > 10){
history.shift();
}

document.getElementById("result").textContent = idea;

}
