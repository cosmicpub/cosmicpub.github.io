@media (max-width: 700px){

  padding:8px 10px;

  box-shadow:0 4px 10px rgba(0,0,0,.05);
  transition:background .12s ease;
}

.swatch-code:hover{
  background:#eef2ff;
}

<body>

<header>
  <h1>Random Color Picker</h1>
  <p>Discover a fresh color in one click.</p>
  <div class="nav"><a href="/">← Back to all tools</a></div>
</header>

<div class="container">
  <div class="card tool-wrap">

    <h2>Random Color Picker</h2>
    <p class="intro">Get a random color name, hex code, and a matching mini palette.</p>

    <div id="colorDisplay" class="color-display">
      <div class="color-inner">
        <div id="colorName" class="color-name">Tap below</div>
        <div id="colorHex" class="color-hex">to pick a color</div>
        <div id="colorRgb" class="color-rgb"></div>
      </div>
    </div>

    <div class="btn-row">
      <button type="button" onclick="pickColor()">Pick a Color</button>
      <button type="button" class="ghost-btn" onclick="copyHex()">Copy Hex</button>
      <button type="button" class="ghost-btn" onclick="copyName()">Copy Name</button>
    </div>

    <div id="copiedMsg" class="copied"></div>

    <div id="paletteBar" class="palette-bar"></div>

    <div class="tiny-note">Recent colors are skipped so each pick feels fresh.</div>

  </div>
</div>

<script>

  function hexToRgb(hex) {
    const clean = hex.replace("#", "");
    const bigint = parseInt(clean, 16);
    const r = (bigint >> 16) & 255;
    const g = (bigint >> 8) & 255;
    const b = bigint & 255;
    return { r, g, b };
  }

  function getContrastColor(hex) {
    const { r, g, b } = hexToRgb(hex);
    const luminance = (0.299 * r + 0.587 * g + 0.114 * b);
    return luminance > 160 ? "#111827" : "#ffffff";
  }

  function adjustColor(hex, amount) {
    let usePound = false;
    let color = hex;

    if (color[0] === "#") {
      color = color.slice(1);
      usePound = true;
    }

    let num = parseInt(color, 16);

    let r = (num >> 16) + amount;
    let b = ((num >> 8) & 0x00FF) + amount;
    let g = (num & 0x0000FF) + amount;

    r = Math.max(Math.min(255, r), 0);
    b = Math.max(Math.min(255, b), 0);
    g = Math.max(Math.min(255, g), 0);

    return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16).padStart(6, "0");
  }

  function buildPalette(hex) {
    return [
      adjustColor(hex, 50),
      adjustColor(hex, 25),
      hex,
      adjustColor(hex, -25),
      adjustColor(hex, -50)
    ];
  }

  function pickColor() {
    let available = colors.filter(color => !history.includes(color.hex));

    if (available.length === 0) {
      history = [];
      available = colors;
    }

    const chosen = available[Math.floor(Math.random() * available.length)];
    currentColor = chosen;

    history.push(chosen.hex);
    if (history.length > RECENT_LIMIT) {
      history.shift();
    }

    const display = document.getElementById("colorDisplay");
    const nameEl = document.getElementById("colorName");
    const hexEl = document.getElementById("colorHex");
    const rgbEl = document.getElementById("colorRgb");
    const copiedMsg = document.getElementById("copiedMsg");

    const textColor = getContrastColor(chosen.hex);
    const rgb = hexToRgb(chosen.hex);

    display.style.background = chosen.hex;
    display.style.color = textColor;

    nameEl.textContent = chosen.name;
    hexEl.textContent = chosen.hex.toUpperCase();
    rgbEl.textContent = `RGB(${rgb.r}, ${rgb.g}, ${rgb.b})`;
    copiedMsg.textContent = "";

    renderPalette(chosen.hex);
  }

  function renderPalette(hex) {
  const palette = buildPalette(hex);
  const bar = document.getElementById("paletteBar");

  bar.innerHTML = palette.map(color => `
    <div class="swatch-wrap">
      <div 
        class="swatch" 
        style="background:${color};" 
        title="Click to copy ${color.toUpperCase()}"
        onclick="copyPaletteColor('${color.toUpperCase()}')">
      </div>
      <div 
        class="swatch-code" 
        onclick="copyPaletteColor('${color.toUpperCase()}')">
        ${color.toUpperCase()}
      </div>
    </div>
  `).join("");
}
  async function copyPaletteColor(hex) {
  await navigator.clipboard.writeText(hex);
  document.getElementById("copiedMsg").textContent = `${hex} copied.`;
}

  async function copyHex() {
    if (!currentColor) return;
    await navigator.clipboard.writeText(currentColor.hex.toUpperCase());
    document.getElementById("copiedMsg").textContent = "Hex code copied.";
  }

  async function copyName() {
    if (!currentColor) return;
    await navigator.clipboard.writeText(currentColor.name);
    document.getElementById("copiedMsg").textContent = "Color name copied.";
  }
</script>
