<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coin Flip | Heads or Tails</title>
<meta name="description" content="Flip a coin online and watch it spin before landing on heads or tails.">

<link rel="stylesheet" href="/assets/style.css">

<style>

.coin{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:bold;
  color:white;

  background:linear-gradient(145deg,#ffd700,#d4af37);
  box-shadow:
    inset 0 0 8px rgba(0,0,0,.3),
    0 10px 25px rgba(0,0,0,.25);

  transition:transform 1s;
}

.coin.flip{
  animation:flip 1s ease-in-out;
}

@keyframes flip{
  0% {transform:rotateY(0deg)}
  100% {transform:rotateY(1080deg)}
}

</style>

</head>

<body>

<header>
<h1>Decide For Me</h1>
<p>Stop overthinking. Let the internet decide.</p>
<div class="nav"><a href="/">← Back to all tools</a></div>
</header>

<div class="container">

<div class="card">

<h2>Coin Flip</h2>
<p>Flip a coin and get HEADS or TAILS instantly.</p>

<div id="coin" class="coin">?</div>

<button onclick="flipCoin()">Flip</button>

<div id="result" class="result"></div>

</div>

</div>

<script>

function flipCoin(){

  const coin = document.getElementById("coin");
  const result = document.getElementById("result");

  coin.classList.remove("flip");
  void coin.offsetWidth;
  coin.classList.add("flip");

  result.textContent="Flipping...";

  setTimeout(()=>{

    const outcome = Math.random() < 0.5 ? "HEADS" : "TAILS";

    coin.textContent = outcome === "HEADS" ? "H" : "T";
    result.textContent = outcome;

  },900);

}

</script>

</body>
</html>
