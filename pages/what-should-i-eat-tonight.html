<!DOCTYPE html>
<html>
<head>
<title>What Should I Eat Tonight?</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<header>
<h1>Decide For Me</h1>
<p>Stop overthinking. Let the internet decide.</p>
<div class="nav"><a href="/">← Back to all tools</a></div>
</header>

<div class="container">
<div class="card">

<h2>What Should I Eat Tonight?</h2>
<p>Let the internet choose dinner.</p>

<button onclick="runTool()">Pick Dinner</button>

<div id="result" class="result"></div>

</div>
</div>

<script>

const OPTIONS = [
"Pizza",
"Tacos",
"Burgers",
"Pasta",
"Chicken and rice",
"Stir fry",
"BBQ",
"Sandwich and fries",
"Breakfast for dinner",
"Sushi"
]

function runTool(){

const pick = OPTIONS[Math.floor(Math.random()*OPTIONS.length)]

document.getElementById("result").textContent = pick

}

</script>

</body>
</html>
