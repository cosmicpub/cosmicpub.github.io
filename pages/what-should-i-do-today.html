<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>What Should I Do Today?</title>
<meta name="description" content="Get a random activity idea when you're bored. Avoid repeats and discover something new to do today.">

<link rel="stylesheet" href="/assets/style.css">

<style>
  .sub{
    margin-top:8px;
    color:#6b7280;
    font-size:14px;
  }
  .row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:14px;
  }
  .ghost{
    background: transparent;
    border: 2px solid rgba(79,70,229,.25);
    color:#111827;
  }
  .tiny{
    margin-top:12px;
    font-size:13px;
    color:#6b7280;
  }
</style>

</head>

<body>

<header>
  <h1>Decide For Me</h1>
  <p>Stop overthinking. Let the internet decide.</p>
  <div class="nav"><a href="/">← Back to all tools</a></div>
</header>

<div class="container">
  <div class="card">

    <h2>What Should I Do Today?</h2>
    <p class="sub">Tap for a random idea. Recent picks are skipped so it stays fresh.</p>

    <div class="row">
      <button id="goBtn" onclick="pickIdea()">Give me an idea</button>
      <button class="ghost" onclick="resetHistory()">Reset history</button>
    </div>

    <div id="result" class="result" style="margin-top:18px;"></div>
    <div id="meta" class="tiny"></div>

  </div>
</div>

<script>
/* -----------------------------
   No-repeat logic (static)
   ----------------------------- */
const RECENT_KEY = "dfm_today_recent";
const RECENT_KEEP = 8;

/* Expanded idea pool (100+)
   You can add more any time. */
const ideas = [
"Go for a 30 minute walk",
"Clean your room",
"Try a new recipe",
"Watch a documentary",
"Call a friend",
"Start a new book",
"Go explore a new coffee shop",
"Take photos around your town",
"Do a quick workout",
"Organize your workspace",
"Listen to a podcast",
"Write down your goals",
"Try a new hobby",
"Learn a random fact",
"Plan your next trip",

"Go for a bike ride",
"Stretch for 10 minutes",
"Declutter one drawer",
"Write a journal entry",
"Cook a meal from another culture",
"Rearrange your room",
"Watch a classic movie",
"Create a playlist",
"Read 10 pages of a book",
"Learn a new word",
"Take a power nap",
"Go watch the sunset",
"Drink a full glass of water",
"Clean your phone screen",
"Sort your email inbox",

"Do 20 pushups",
"Take a cold shower",
"Write a thank-you message to someone",
"Go people-watch at a park",
"Visit a bookstore",
"Look up a new skill on YouTube",
"Try a new restaurant",
"Go somewhere you’ve never been in your city",
"Take a scenic drive",
"Write a short story",

"Sketch something around you",
"Make a simple dessert",
"Watch a TED talk",
"Organize your photos",
"Delete unused apps",
"Learn 5 words in another language",
"Watch stand-up comedy",
"Do a 10-minute meditation",
"Stretch your legs outside",
"Plan your weekend",

"Research a topic you're curious about",
"Start a small DIY project",
"Water your plants",
"Clean your desk",
"Take a deep breathing break",
"Watch a nature video",
"Practice handwriting",
"Try a brain puzzle",
"Read a random Wikipedia article",
"Make a cup of tea or coffee",

"Write down three things you're grateful for",
"Try a new workout routine",
"Organize your bookmarks",
"Explore a new music genre",
"Look through old photos",
"Plan a future goal",
"Write a bucket list",
"Watch a travel vlog",
"Do a mini home workout",
"Learn a simple magic trick",

"Go sit outside for 10 minutes",
"Compliment someone",
"Make a smoothie",
"Learn a new keyboard shortcut",
"Practice typing speed",
"Take a short walk without your phone",
"Look up a new recipe",
"Write a poem",
"Listen to instrumental music",
"Explore a new podcast",

"Clean out your wallet",
"Read a motivational quote",
"Create a vision board idea list",
"Make a grocery list",
"Watch a short educational video",
"Practice drawing shapes",
"Look up a random historical event",
"Research a place you'd like to visit",
"Check the weather somewhere else in the world",
"Look up interesting space facts",

"Try a quick yoga stretch",
"Walk around your neighborhood",
"Write a letter to your future self",
"Organize your desktop files",
"Create a simple daily routine",
"Learn a fun science fact",
"Watch a movie trailer",
"Try a new snack",
"Make a to-do list",
"Do something kind for someone",

"Set a small goal for tomorrow",
"Look up something inspiring",
"Think of a new business idea",
"Read a chapter of a book",
"Take a moment to relax",
"Step outside for fresh air",
"Reflect on your day",
"Try a quick creativity exercise",
"Write down an idea you've had",
"Start planning your next adventure"
];

function randIndex(max){
  return Math.floor(Math.random() * max);
}

function getRecent(){
  try{
    const raw = localStorage.getItem(RECENT_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  }catch(e){
    return [];
  }
}

function setRecent(arr){
  try{
    localStorage.setItem(RECENT_KEY, JSON.stringify(arr.slice(0, RECENT_KEEP)));
  }catch(e){}
}

function pickIdea(){
  const recent = getRecent();
  let pick = null;

  // Try up to 30 times to avoid recent repeats
  for(let i=0;i<30;i++){
    const candidate = ideas[randIndex(ideas.length)];
    if(!recent.includes(candidate)){
      pick = candidate;
      break;
    }
  }

  // Fallback (rare)
  if(!pick) pick = ideas[randIndex(ideas.length)];

  // Update UI
  document.getElementById("result").textContent = pick;

  // Save recent
  const updated = [pick, ...recent.filter(x => x !== pick)];
  setRecent(updated);

  // Meta
  document.getElementById("meta").textContent =
    `Idea pool: ${ideas.length} • Skipping last ${RECENT_KEEP} picks`;
  
  // Change button label after first run (nice UX)
  const btn = document.getElementById("goBtn");
  if(btn) btn.textContent = "Another idea";
}

function resetHistory(){
  try{ localStorage.removeItem(RECENT_KEY); }catch(e){}
  document.getElementById("result").textContent = "";
  document.getElementById("meta").textContent = "History cleared.";
  const btn = document.getElementById("goBtn");
  if(btn) btn.textContent = "Give me an idea";
}
</script>

</body>
</html>
