<!DOCTYPE html>
<html>
<head>
<title>Yes or No Decision Maker</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f6fb;
margin:0;
}

header{
background:#4f46e5;
color:white;
padding:25px;
}

.container{
padding:40px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
cursor:pointer;
}

#result{
font-size:32px;
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Yes or No Decision Maker</h1>
</header>

<div class="container">

<p>Can't decide? Press the button.</p>

<button onclick="decide()">Decide</button>

<div id="result"></div>

</div>

<script>

function decide(){
const answers = ["YES","NO"];
const pick = answers[Math.floor(Math.random()*answers.length)];
document.getElementById("result").textContent = pick;
}

</script>

</body>
</html>
