<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Outfit Picker | Decide For Me</title>
  <meta name="description" content="Let the internet decide what you should wear today.">

  <link rel="stylesheet" href="/assets/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6749618919601275"
       crossorigin="anonymous"></script>

  <style>
    .result-box{
      margin-top:24px;
      padding:22px;
      border-radius:16px;
      background:#f8fafc;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      font-size:28px;
      font-weight:800;
      line-height:1.35;
      min-height:84px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .subtext{
      margin-top:10px;
      color:#6b7280;
      font-size:15px;
      text-align:center;
    }
  </style>
</head>

<body>

<header>
  <h1>Outfit Picker</h1>
  <p>Can’t decide what to wear? Let the internet choose.</p>
  <div class="nav"><a href="/">← Back to all tools</a></div>
</header>

<div class="container">
  <div class="card">

    <h2>Outfit Picker</h2>
    <p>Tap the button for a random outfit idea.</p>

    <button id="pickBtn" type="button">Pick My Outfit</button>

    <div id="result" class="result-box">Tap the button to get an outfit idea.</div>
    <div class="subtext">Fresh picks, with recent results skipped.</div>

  </div>
</div>

<script>
  const outfits = [
    "Jeans + t-shirt + sneakers",
    "Joggers + hoodie + sneakers",
    "Shorts + graphic tee + sneakers",
    "Black jeans + plain tee + jacket",
    "Cargo pants + hoodie + cap",
    "Sweatpants + sweatshirt + slides",
    "Khaki shorts + polo + sneakers",
    "Dark jeans + flannel + boots",
    "Track pants + athletic shirt + trainers",
    "White tee + denim jacket + black jeans",

    "Leggings + oversized sweatshirt + sneakers",
    "Jeans + blouse + flats",
    "Maxi dress + sandals",
    "Shorts + tank top + sneakers",
    "Joggers + cropped hoodie + sneakers",
    "Black leggings + denim jacket + white sneakers",
    "Skirt + tucked tee + sandals",
    "Wide-leg pants + fitted top + flats",
    "Sundress + cardigan + sandals",
    "Jeans + sweater + ankle boots",

    "Business casual: slacks + button-up",
    "Business casual: blouse + slacks",
    "Office look: pencil skirt + blouse",
    "Office look: chinos + polo",
    "Smart casual: dark jeans + blazer",
    "Smart casual: midi dress + flats",
    "Meeting ready: dress shirt + khakis",
    "Meeting ready: blouse + trousers",
    "Polished casual: sweater + dark jeans",
    "Polished casual: cardigan + blouse + jeans",

    "Workout clothes: athletic tee + shorts",
    "Workout clothes: tank + leggings",
    "Workout clothes: hoodie + joggers",
    "Gym look: moisture-wicking tee + shorts",
    "Gym look: sports top + leggings",
    "Walk outfit: comfy tee + joggers",
    "Run outfit: light top + shorts",
    "Activewear: zip-up + leggings",
    "Stretch day: oversized tee + leggings",
    "Casual sporty: sweatshirt + bike shorts",

    "Cold weather: sweater + jeans + boots",
    "Cold weather: hoodie + coat + jeans",
    "Cold weather: thermal shirt + joggers",
    "Layered look: long sleeve + flannel + jeans",
    "Winter casual: knit sweater + leggings + boots",
    "Winter comfy: oversized hoodie + sweatpants",
    "Bundle up: coat + scarf + jeans",
    "Chilly day: cardigan + tee + dark jeans",
    "Rainy day: hoodie + joggers + waterproof shoes",
    "Cold date look: sweater dress + boots",

    "Hot weather: tank top + shorts + sandals",
    "Hot weather: lightweight tee + shorts",
    "Hot weather: sundress + sandals",
    "Hot weather: linen shirt + shorts",
    "Hot weather: sleeveless top + skirt",
    "Beachy casual: tank + denim shorts",
    "Summer casual: tee + athletic shorts",
    "Summer comfy: flowy top + shorts",
    "Warm day: polo + chino shorts",
    "Warm day: breezy dress + flats",

    "Stay-home comfy: pajama set",
    "Stay-home comfy: oversized tee + shorts",
    "Stay-home comfy: hoodie + lounge pants",
    "Stay-home comfy: sweatshirt + leggings",
    "Stay-home comfy: soft tee + joggers",
    "Lazy day: sweats + slippers",
    "Lazy day: oversized hoodie + bike shorts",
    "At-home casual: tee + lounge shorts",
    "Comfy fit: crewneck + sweatpants",
    "Netflix outfit: blanket hoodie + leggings",

    "Date night: dark jeans + fitted top + boots",
    "Date night: dress + heels",
    "Date night: black jeans + button-up",
    "Date night: skirt + blouse + boots",
    "Date night: nice top + trousers",
    "Date night: collared shirt + dark pants",
    "Date night: midi dress + jacket",
    "Date night: blazer + tee + jeans",
    "Dinner look: sweater + skirt + ankle boots",
    "Dinner look: polo + chinos + loafers",

    "Errands outfit: leggings + tee + sneakers",
    "Errands outfit: joggers + hoodie + sneakers",
    "Errands outfit: tee + shorts + slides",
    "Errands outfit: jeans + sweatshirt + sneakers",
    "Quick trip: tank + joggers",
    "Quick trip: oversized tee + biker shorts",
    "Grocery run: hoodie + leggings",
    "Grocery run: tee + athletic shorts",
    "Coffee run: jeans + cardigan + sneakers",
    "Coffee run: sweatshirt + shorts + slides"
  ];

  let history = [];

  function pickOutfit() {
    let available = outfits.filter(item => !history.includes(item));

    if (available.length === 0) {
      history = [];
      available = outfits;
    }

    const outfit = available[Math.floor(Math.random() * available.length)];

    history.push(outfit);
    if (history.length > 10) {
      history.shift();
    }

    document.getElementById("result").textContent = outfit;
  }

  document.getElementById("pickBtn").addEventListener("click", pickOutfit);
</script>

</body>
</html>
