let truthHistory = [];

function getRandom(arr, history){

let available = arr.filter(item => !history.includes(item));

if(available.length === 0){
history.length = 0;
available = arr;
}

const pick = available[Math.floor(Math.random()*available.length)];

history.push(pick);

if(history.length > 10){
history.shift();
}

return pick;

}
