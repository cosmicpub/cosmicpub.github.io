<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truth or Dare</title>

<link rel="stylesheet" href="/assets/style.css">

</head>

<body>

<header>
<h1>Decide For Me</h1>
<p>Stop overthinking. Let the internet decide.</p>
<div class="nav"><a href="/">← Back to all tools</a></div>
</header>

<div class="container">

<div class="card">

<h2>Truth or Dare</h2>

<button onclick="truth()">Truth</button>
<button onclick="dare()">Dare</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

const truths = [

"What is your biggest fear?",
"What is something embarrassing you've done?",
"What is your biggest regret?",
"What is your secret talent?",
"Who was your first crush?",
"What is something you've never told anyone?",
"What is your weirdest habit?",
"What is your guilty pleasure?",
"What is the most trouble you've been in?",
"What is your biggest pet peeve?"

];

const dares = [

"Do 10 pushups",
"Sing a song out loud",
"Do a silly dance",
"Talk in an accent for 1 minute",
"Spin around 5 times",
"Act like a chicken",
"Send a funny selfie",
"Do your best celebrity impression",
"Jump up and down 20 times",
"Say the alphabet backwards"

];

function truth(){

const t = truths[Math.floor(Math.random()*truths.length)];

document.getElementById("result").textContent = t;

}

function dare(){

const d = dares[Math.floor(Math.random()*dares.length)];

document.getElementById("result").textContent = d;

}

</script>

</body>
</html>
